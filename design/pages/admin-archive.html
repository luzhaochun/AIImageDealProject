<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>终稿导出 — ImageDeal Admin</title>
  <link rel="stylesheet" href="../css/design-system.css" />
</head>
<body>
  <div class="badge-prototype">设计稿 · 终稿导出</div>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">Image<span>Deal</span></div>
      <div class="sidebar-role">管理员</div>
      <nav class="sidebar-nav">
        <a href="admin-import.html">CSV 导入</a>
        <a href="admin-archive.html" class="active">终稿导出</a>
      </nav>
    </aside>
    <div class="main">
      <header class="topbar"><span class="topbar-title">终稿归档与导出</span></header>
      <div class="content">
        <div class="page-header">
          <h1>终稿导出</h1>
          <p>从终稿库/归档库筛选图片，打包 ZIP + manifest.csv</p>
        </div>

        <div class="card">
          <div class="card-title">筛选条件</div>
          <div class="grid-2">
            <div class="form-group">
              <label class="form-label">分类</label>
              <select class="form-select"><option>全部</option><option>banner</option><option>poster</option></select>
            </div>
            <div class="form-group">
              <label class="form-label">状态</label>
              <select class="form-select"><option>已归档 completed</option><option>二审通过</option></select>
            </div>
            <div class="form-group">
              <label class="form-label">开始日期</label>
              <input class="form-input" type="date" value="2026-05-01" />
            </div>
            <div class="form-group">
              <label class="form-label">结束日期</label>
              <input class="form-input" type="date" value="2026-05-31" />
            </div>
          </div>
          <button class="btn btn-primary">创建导出任务</button>
        </div>

        <div class="card">
          <div class="card-title">导出任务历史</div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>任务 ID</th><th>条件</th><th>状态</th><th>创建时间</th><th>操作</th></tr></thead>
              <tbody>
                <tr>
                  <td>exp-001</td><td>banner · 5月</td>
                  <td><span class="tag tag-success">已完成</span></td>
                  <td>2026-05-23 11:00</td>
                  <td><a href="#">下载 ZIP (128MB)</a></td>
                </tr>
                <tr>
                  <td>exp-002</td><td>全部 · 5月</td>
                  <td><span class="tag tag-processing">打包中</span></td>
                  <td>2026-05-23 14:30</td>
                  <td>—</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
