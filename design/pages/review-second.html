<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>二审队列 — ImageDeal</title>
  <link rel="stylesheet" href="../css/design-system.css" />
</head>
<body>
  <div class="badge-prototype">设计稿 · 二审</div>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">Image<span>Deal</span></div>
      <div class="sidebar-role">审核员</div>
      <nav class="sidebar-nav">
        <a href="review-first.html">一审队列</a>
        <a href="review-second.html" class="active">二审队列</a>
      </nav>
    </aside>
    <div class="main">
      <header class="topbar"><span class="topbar-title">二审（可选）</span></header>
      <div class="content">
        <div class="page-header">
          <h1>二审抽样</h1>
          <p>从「一审通过库」领取进入二审，租户可配置抽样比例或全量</p>
        </div>

        <div class="alert alert-info">
          当前租户策略：<strong>人工领取</strong> · 二审通过后进入终稿库
        </div>

        <div class="card">
          <div class="card-title">一审通过库（可领取）</div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>缩略图</th><th>编号</th><th>类目</th><th>一审通过时间</th><th>操作</th></tr>
              </thead>
              <tbody>
                <tr>
                  <td><div class="thumb"></div></td>
                  <td>ACME-20260521-000018</td>
                  <td>banner</td>
                  <td>2026-05-22</td>
                  <td><button class="btn btn-primary btn-sm">领取二审</button></td>
                </tr>
                <tr>
                  <td><div class="thumb"></div></td>
                  <td>ACME-20260521-000015</td>
                  <td>poster</td>
                  <td>2026-05-22</td>
                  <td><button class="btn btn-primary btn-sm">领取二审</button></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <div class="card">
          <div class="card-title">我已领取（待二审）</div>
          <div class="empty-state">暂无 · 请从上方库中领取</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
