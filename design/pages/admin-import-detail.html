<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>批次详情 — ImageDeal Admin</title>
  <link rel="stylesheet" href="../css/design-system.css" />
</head>
<body>
  <div class="badge-prototype">设计稿 · 导入详情</div>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">Image<span>Deal</span></div>
      <div class="sidebar-role">管理员</div>
      <nav class="sidebar-nav">
        <a href="admin-import.html" class="active">CSV 导入</a>
        <a href="admin-archive.html">终稿导出</a>
      </nav>
    </aside>
    <div class="main">
      <header class="topbar">
        <span class="topbar-title"><a href="admin-import.html">← 导入列表</a> / 批次 b8f2…4a1</span>
      </header>
      <div class="content">
        <div class="page-header">
          <h1>banner_may.csv</h1>
          <p>自动刷新 · 每 3 秒更新进度</p>
        </div>

        <div class="alert alert-info">系统正在下载图片并生成缩略图，完成后状态将变为「已完成」。</div>

        <div class="grid-4" style="margin-bottom:24px">
          <div class="stat-card"><div class="stat-label">总行数</div><div class="stat-value">1000</div></div>
          <div class="stat-card"><div class="stat-label">已成功</div><div class="stat-value" style="color:var(--success)">670</div></div>
          <div class="stat-card"><div class="stat-label">已失败</div><div class="stat-value" style="color:var(--error)">5</div></div>
          <div class="stat-card"><div class="stat-label">待处理</div><div class="stat-value">325</div></div>
        </div>

        <div class="card">
          <div class="card-title">整体进度</div>
          <div class="progress"><div class="progress-bar" style="width:67%"></div></div>
          <p style="font-size:13px;color:var(--text-secondary)">67% · 预计剩余约 8 分钟</p>
        </div>

        <div class="card">
          <div class="card-title">失败记录（示例）</div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>行号</th><th>URL</th><th>原因</th></tr></thead>
              <tbody>
                <tr><td>128</td><td style="max-width:280px;overflow:hidden;text-overflow:ellipsis">https://example.com/bad.jpg</td><td>下载超时</td></tr>
                <tr><td>256</td><td>https://…</td><td>格式不支持</td></tr>
              </tbody>
            </table>
          </div>
          <div class="btn-group" style="margin-top:12px">
            <button class="btn btn-default">下载完整错误日志</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
