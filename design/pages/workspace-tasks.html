<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>我的任务 — ImageDeal</title>
  <link rel="stylesheet" href="../css/design-system.css" />
</head>
<body>
  <div class="badge-prototype">设计稿 · 任务列表</div>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">Image<span>Deal</span></div>
      <nav class="sidebar-nav">
        <a href="workspace-claim.html">领图</a>
        <a href="workspace-tasks.html" class="active">我的任务</a>
      </nav>
    </aside>
    <div class="main">
      <header class="topbar"><span class="topbar-title">我的任务</span></header>
      <div class="content">
        <div class="page-header">
          <h1>任务列表</h1>
          <p>用户任务区：已领取、作图中、已驳回、待审核</p>
        </div>

        <div class="btn-group" style="margin-bottom:16px">
          <button class="btn btn-default btn-sm">全部</button>
          <button class="btn btn-primary btn-sm">进行中</button>
          <button class="btn btn-default btn-sm">待审核</button>
          <button class="btn btn-default btn-sm">已驳回</button>
          <a href="workspace-claim.html" class="btn btn-primary" style="margin-left:auto">+ 领图</a>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>缩略图</th><th>全局编号</th><th>类目</th><th>状态</th>
                <th>更新时间</th><th>备注</th><th>操作</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td><div class="thumb"></div></td>
                <td><strong>ACME-20260523-000042</strong></td>
                <td>banner</td>
                <td><span class="tag tag-processing">作图中</span></td>
                <td>5 分钟前</td><td>—</td>
                <td>
                  <a href="workspace-editor.html" class="btn btn-primary btn-sm">继续编辑</a>
                  <button class="btn btn-default btn-sm">提交审核</button>
                </td>
              </tr>
              <tr>
                <td><div class="thumb"></div></td>
                <td>ACME-20260523-000038</td>
                <td>poster</td>
                <td><span class="tag tag-error">已驳回</span></td>
                <td>2 小时前</td>
                <td style="max-width:160px;font-size:12px;color:var(--error)">文字过小，请放大标题</td>
                <td>
                  <a href="workspace-editor.html" class="btn btn-primary btn-sm">修改</a>
                </td>
              </tr>
              <tr>
                <td><div class="thumb"></div></td>
                <td>ACME-20260522-000031</td>
                <td>banner</td>
                <td><span class="tag tag-warning">待一审</span></td>
                <td>昨天</td><td>—</td>
                <td><span style="font-size:13px;color:var(--text-secondary)">等待审核</span></td>
              </tr>
              <tr>
                <td><div class="thumb"></div></td>
                <td>ACME-20260522-000028</td>
                <td>banner</td>
                <td><span class="tag tag-processing">已领取</span></td>
                <td>昨天</td><td>—</td>
                <td>
                  <a href="workspace-editor.html" class="btn btn-primary btn-sm">开始编辑</a>
                  <button class="btn btn-default btn-sm">换图</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
